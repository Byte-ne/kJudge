<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: "kjudge Documentation" }}</title>
    <style>
        body {
            font-family: Verdana, Geneva, sans-serif;
            font-size: 13px;
            color: #222;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }
        #nav {
            background-color: #3b5998;
            color: white;
            padding: 8px 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
        }
        #nav a {
            color: white;
            text-decoration: none;
            margin-right: 15px;
        }
        #nav a:hover {
            text-decoration: underline;
        }
        #container {
            background-color: #f6f6ef;
            max-width: 900px;
            margin: 0 auto;
            border-left: 1px solid #ddd;
            border-right: 1px solid #ddd;
            min-height: 100vh;
            padding: 20px 40px;
        }
        h1, h2, h3 {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            color: #000;
        }
        h1 { font-size: 20px; border-bottom: 2px solid #3b5998; padding-bottom: 5px; }
        h2 { font-size: 16px; margin-top: 30px; border-bottom: 1px solid #ccc; padding-bottom: 3px; }
        h3 { font-size: 14px; margin-top: 20px; }
        a { color: #0000ee; text-decoration: none; }
        a:hover { text-decoration: underline; }
        pre, code {
            font-family: Consolas, 'Courier New', monospace;
            background-color: #eaeaea;
            padding: 2px 4px;
            font-size: 12px;
            border-radius: 3px;
        }
        pre {
            padding: 10px;
            display: block;
            border: 1px solid #ccc;
            overflow-x: auto;
        }
        pre code {
            background-color: transparent;
            padding: 0;
            border-radius: 0;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 15px 0;
            font-size: 12px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 6px 10px;
            text-align: left;
        }
        th { background-color: #e5e5e5; }
        .footer {
            margin-top: 40px;
            border-top: 1px solid #ccc;
            padding-top: 10px;
            font-size: 11px;
            color: #828282;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="container">
    <div id="nav">
        <span>kjudge</span>
        <span style="margin-left: 20px; font-weight: normal; font-size: 12px;">
            <a href="/">Home</a> | 
            <a href="/docs/architecture.html">Architecture</a> | 
            <a href="/docs/advanced_workflows.html">Workflows</a> | 
            <a href="/docs/config_mechanics.html">Config</a> |
            <a href="/docs/distribution.html">Distribution</a>
        </span>
    </div>

    <div class="content">
        {{ content }}
    </div>

    <div class="footer">
        kjudge &mdash; CLI Local Judge Application. Designed for minimalists and peak efficiency.
    </div>
</div>

</body>
</html>
